---
- name: Download K3s install script
  ansible.builtin.get_url:
    url: 'https://get.k3s.io/'
    timeout: 120
    dest: '/usr/local/bin/k3s-install.sh'
    owner: 'root'
    group: 'root'
    mode: '0755'

- name: Install K3s
  ansible.builtin.command:
    cmd: /usr/local/bin/k3s-install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_SKIP_START: "true"
  changed_when: true

- name: Setup optional config file
  when:
    - k3s_server_config_yaml is defined
  block:
    - name: Make config directory
      ansible.builtin.file:
        path: '/etc/rancher/k3s'
        mode: '0755'
        state: directory
    - name: Copy config values
      ansible.builtin.copy:
        content: "{{ k3s_server_config_yaml }}"
        dest: '/etc/rancher/k3s/config.yaml'
        mode: '0644'

- name: Init first server node
  when:
    - inventory_hostname == groups['k3s_server'][0]
  block:
    - name: Copy K3s service file [Single]
      when: groups['k3s_server'] | length == 1
      ansible.builtin.template:
        src: "k3s-single.service.j2"
        dest: "{{ k3s_systemd_dir }}/k3s.service"
        owner: 'root'
        group: 'root'
        mode: '0644'

    - name: Copy K3s service file [HA]
      when: groups['k3s_server'] | length > 1
      ansible.builtin.template:
        src: "k3s-cluster-init.service.j2"
        dest: "{{ k3s_systemd_dir }}/k3s.service"
        owner: 'root'
        group: 'root'
        mode: '0644'

    - name: Add service environment variables
      when: k3s_extra_service_envs is defined
      ansible.builtin.lineinfile:
        path: "{{ k3s_systemd_dir }}/k3s.service.env"
        line: "{{ item }}"
      loop: "{{ k3s_extra_service_envs }}"

    - name: Enable and check K3s service
      ansible.builtin.systemd:
        name: k3s
        daemon_reload: true
        state: started
        enabled: true

    - name: Pause to allow first server startup
      when: (groups['k3s_server'] | length) > 1
      ansible.builtin.pause:
        seconds: 10

    - name: Does mountpoint exists
      ansible.builtin.stat:
        path: "{{ k3s_kubeconfig }}"
      register: results
    - name: Move a local file
      ansible.builtin.command:
        cmd: "mv {{ k3s_kubeconfig }} {{ k3s_kubeconfig }}.bak_$(date +%s)"
      delegate_to: 127.0.0.1
      become: false
      when: results.stat.exists
    - name: Copy kubectl config to local machine
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ k3s_kubeconfig }}"
        flat: true

    - name: Setup kubeconfig k3s-ansible context
      ansible.builtin.replace:
        path: "{{ k3s_kubeconfig }}"
        regexp: 'default'
        replace: "{{ k3s_context_name }}"
      delegate_to: 127.0.0.1
      become: false

    - name: Change server to API endpoint instead of localhost
      ansible.builtin.shell: |
        kubectl config set-cluster {{ k3s_context_name }} \
          --server=https://{{ k3s_api_endpoint }}:{{ k3s_api_port }} \
          --kubeconfig {{ k3s_kubeconfig }}
      delegate_to: 127.0.0.1
      become: false
      changed_when: true
