---
- name: Include OS-specific tasks
  ansible.builtin.include_tasks: "{{ ansible_facts['os_family'] | lower }}.yml"

- name: Validate Docker firewall backend
  ansible.builtin.assert:
    that:
      - docker_firewall_backend in ['', 'iptables', 'nftables']
    fail_msg: >-
      Invalid docker_firewall_backend '{{ docker_firewall_backend }}'.
      Allowed values: '', 'iptables', 'nftables'.

- name: Ensure Docker data directory exists
  become: true
  ansible.builtin.file:
    state: 'directory'
    path: "{{ docker_data_dir }}"
    owner: 'root'
    group: 'root'
    mode: '0710'

- name: Ensure specified users are in the docker group
  become: true
  ansible.builtin.user:
    name: "{{ item }}"
    groups: 'docker'
    append: true
  loop: "{{ docker_group_members }}"
  when: docker_group_members | length > 0

- name: Ensure Docker configuration directory is present
  become: true
  ansible.builtin.file:
    state: 'directory'
    path: '/etc/docker'
    owner: 'root'
    group: 'root'
    mode: '0755'

- name: Ensure Docker daemon is configured
  become: true
  ansible.builtin.template:
    src: 'daemon.json.j2'
    dest: '/etc/docker/daemon.json'
    owner: 'root'
    group: 'root'
    mode: '0644'
    lstrip_blocks: true
    trim_blocks: true
  notify: Restart Docker

- name: Start Docker service
  become: true
  ansible.builtin.service:
    name: 'docker'
    enabled: true
    state: 'started'
  tags:
    - docker-install

- name: Ensure all handlers run before continuing
  ansible.builtin.meta: flush_handlers
