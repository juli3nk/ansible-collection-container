---
docker_repo_url: https://download.docker.com/linux

docker_apt_gpg_key: "{{ docker_repo_url }}/{{ ansible_facts['distribution'] | lower }}/gpg"
docker_apt_repository_name: docker
docker_apt_architecture_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armhf
  ppc64le: ppc64el
docker_apt_architecture: "{{ docker_apt_architecture_map.get(ansible_facts['architecture'], ansible_facts['architecture']) }}"

docker_data_dir: /opt/docker
docker_debug: false
docker_group_members: []
docker_firewall_backend: ''

docker_packages:
  - containerd.io
  - docker-ce
  - docker-ce-cli
  - docker-buildx-plugin

docker_log_cache_compress: true
docker_log_cache_files: 5
docker_log_cache_size: 20m
docker_log_local_compress: true
docker_log_local_files: 3
docker_log_local_size: 10m
docker_log_gelf: false
docker_log_gelf_url: ''
